services:
  db:
    image: postgres:16-alpine
    container_name: finary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finary_patrimoine}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-finary_patrimoine}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finary-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-finary_patrimoine}?schema=public
      AUTH_URL: ${AUTH_URL:-http://localhost:3001}
      PORT: 3000
      PRISMA_SEED_ON_START: ${PRISMA_SEED_ON_START:-true}
    ports:
      - "${APP_PORT:-3001}:3000"

volumes:
  postgres_data:
